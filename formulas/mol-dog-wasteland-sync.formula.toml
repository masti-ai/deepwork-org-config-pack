description = """
Sync beads → wasteland as rich, actionable work packages.

The Wasteland Sync Dog creates **complete work packages** on the wasteland board
that an external contributor (human or agent) can pick up with zero context.

A raw bead like "Fix CORS" becomes a full task with repo, files, current behavior,
desired behavior, how to test, and acceptance criteria.

## What Makes a Good Wasteland Item

BAD (raw bead copy):
  "Fix CORS — restrict allow-origins"

GOOD (work package):
  Title: "Security: Fix CORS — restrict allowed origins to production domains"
  Description includes:
  - Repo: https://github.com/masti-ai/ai-planogram
  - Files: backend/app/main.py (line ~30, CORSMiddleware config)
  - Current: allow_origins=["*"] — accepts requests from any domain
  - Desired: allow_origins=["https://planogram.villamarket.ai", "https://mrmnqxnnmt.ap-southeast-2.awsapprunner.com"]
  - How to test: curl -H "Origin: https://evil.com" and verify 403
  - Acceptance: CORS headers only return for whitelisted domains

## Dog Contract

1. Scan rigs for P0/P1 beads not on wasteland
2. For each: read the bead, read relevant code, write a rich description
3. FILTER: skip internal/agent/infra beads (deacon, witness, patrol, AGENTS.md, hooks)
4. Post as wasteland items with full context
5. Sync status (closed beads → completed wasteland items)
6. Push to DoltHub
7. Return to kennel

## Variables

| Variable | Source | Description |
|----------|--------|-------------|
| rigs | config | Comma-separated rig names to scan (default: all product rigs) |
| max_priority | config | Maximum priority to sync (default: 1 = P0+P1) |
| push | config | Whether to push to DoltHub after sync (default: true) |
| dry_run | config | Show what would sync without making changes (default: false) |
| github_repos | config | JSON map of rig→GitHub repo URL |
"""

[metadata]
type = "dog"
category = "wasteland"
schedule = "0 */4 * * *"
ttl = "45m"

[variables]
rigs = { source = "config", default = "officeworld,deepwork_site,villa_alc_ai,villa_ai_planogram,command_center,products,media_studio" }
max_priority = { source = "config", default = "1" }
push = { source = "config", default = "true" }
dry_run = { source = "config", default = "false" }
github_repos = { source = "config", default = '{"villa_ai_planogram":"https://github.com/masti-ai/ai-planogram","villa_alc_ai":"https://github.com/masti-ai/alc-ai-villa","officeworld":"https://github.com/masti-ai/OfficeWorld","deepwork_site":"https://github.com/masti-ai/website","products":"https://github.com/masti-ai/products","media_studio":"https://github.com/masti-ai/media-studio","command_center":"https://github.com/masti-ai/command-center"}' }

[[steps]]
id = "scan-and-filter"
title = "Scan rigs, filter to external-worthy beads"
description = """
For each rig, query Dolt for open P0/P1 beads:

```bash
dolt --host 127.0.0.1 --port 3307 --user root --password "" --no-tls sql -q "
  SELECT id, title, description, priority, issue_type
  FROM <rig>.issues
  WHERE status='open' AND priority <= {{max_priority}}
" -r csv
```

Then check which are already on wasteland:
```bash
gt wl browse --json
```
Match by title (first 40 chars, case-insensitive). Skip already-posted items.

**FILTER — skip these beads (internal/agent work, not for external contributors):**
- Title contains: deacon, witness, refinery, patrol, AGENTS.md, hooks, formula, molecule, wisp
- Title contains: merge queue, process cleanup, Dolt health, session handoff
- Title starts with: "Pre-existing:", "Merge:", "Boot:"
- Issue type is: chore (unless it's clearly product work)
- Description mentions only internal agent coordination

**KEEP — these are real product work:**
- Features, bugs, UI changes, API work, docs
- Clear acceptance criteria or user-facing impact
- Involves actual code in a repo that external contributors can access

For each bead that passes the filter, add it to the post list.
"""

[[steps]]
id = "enrich-and-post"
title = "Read code context and post rich wasteland items"
needs = ["scan-and-filter"]
description = """
For each filtered bead, create a **complete work package**:

**1. Read the bead:**
```bash
bd show <bead-id>
```

**2. Read relevant code** (if the bead mentions files or you can infer them):
Look at the rig's codebase at `~/gt/<rig>/mayor/rig/` to understand:
- What files are involved
- What the current code looks like
- What needs to change

**3. Write the wasteland description** with this structure:

```
Bead: <bead-id>

## Context
<1-2 sentences: what this project is, what this task is about>

## Repo
<GitHub URL from github_repos config>
Branch: dev (create feature branch from dev)

## Current Behavior
<What exists now / what's broken / what's missing>

## Desired Behavior
<What it should do when this task is complete>

## Key Files
<List the 2-5 most relevant files with brief descriptions>
- `path/to/file.py` — what this file does
- `path/to/component.tsx` — what this component is

## How to Test
<Step-by-step verification that the work is correct>

## Acceptance Criteria
<Bullet list of concrete, checkable conditions>
- [ ] Criterion 1
- [ ] Criterion 2

## Setup
git clone <repo-url>
cd <repo>
<install/setup commands if known>
```

**4. Post to wasteland:**
```bash
gt wl post \
  --title "<clear, descriptive title for an outsider>" \
  --project "<rig-name>" \
  --type "<bug|feature|docs>" \
  --priority <N> \
  --tags "<relevant,tags>" \
  --description "<the rich description above>"
```

**Title rules:**
- Rewrite the bead title if it's too terse or uses internal jargon
- Include the category: "Security:", "UI:", "API:", "Infra:", "Mobile:", "Dashboard:"
- Make it scannable — a stranger should know what this is from the title alone

If dry_run=true, print what would be posted but don't actually post.
"""

[[steps]]
id = "sync-status"
title = "Sync closed beads → completed wasteland items"
needs = ["scan-and-filter"]
description = """
For each rig, find beads closed in the last 24 hours:

```bash
dolt --host 127.0.0.1 --port 3307 --user root --password "" --no-tls sql -q "
  SELECT id, title FROM <rig>.issues
  WHERE status='closed' AND priority <= {{max_priority}}
  AND closed_at > DATE_SUB(NOW(), INTERVAL 24 HOUR)
" -r csv
```

For each closed bead, find the matching wasteland item by title:
```bash
gt wl browse --json
```
Match by first 40 chars of title (case-insensitive).

If found and still open:
```bash
gt wl claim <wl-id>
gt wl done <wl-id> --evidence "Completed internally. Bead <bead-id> closed."
```
"""

[[steps]]
id = "push-and-report"
title = "Push to DoltHub and report"
needs = ["enrich-and-post", "sync-status"]
description = """
Push wasteland changes to DoltHub so friends see them:
```bash
dolt --host 127.0.0.1 --port 3307 --user root --password "" --no-tls sql -q "
  USE gt_collab;
  CALL dolt_add('-A');
  CALL dolt_commit('-m', 'wasteland sync: <N> posted, <N> completed', '--allow-empty');
  CALL dolt_push('origin', 'main');
"
```

Report summary:
- N new items posted (with titles)
- N items completed
- N items skipped (internal/already posted)
- Push status

If any errors, mail the deacon.
"""
