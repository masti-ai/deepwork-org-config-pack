description = """
Write proper release notes and update READMEs for GitHub repos.

Runs weekly (or on-demand). For each your-org repo with a new release:
1. Read the commits since last release
2. Understand what changed (read code diffs, not just commit messages)
3. Write human-readable release notes grouped by category
4. Update the repo README with current project status
5. Push changes

## Why This Needs LLM

Commit messages like "fix(pa-vv6): wrap numpy float64" are agent shorthand.
Release notes should say "Fixed a bug where product positions with decimal
coordinates caused database insert failures."

README updates should reflect current project state — what works, what's
deployed, how to get started.

## Dog Contract

1. Scan repos for releases created by the hourly sync
2. For each: read diffs, write proper notes, update release on GitHub
3. Check if README is stale → update with current project status
4. Return to kennel
"""

[metadata]
type = "dog"
category = "releases"
schedule = "0 6 * * 1"  # Weekly Monday 6 AM
ttl = "30m"

[variables]
github_org = { source = "config", default = "your-org" }

[[steps]]
id = "find-releases"
title = "Find recent releases that need better notes"
description = """
For each repo in the your-org org, check for releases created in the last 7 days
that have auto-generated notes (contain "Auto-sync" or "auto-generated"):

```bash
for repo in project-alpha project-beta project-gamma project-delta project-zeta project-epsilon gt-mesh deepwork-org-config-pack project-eta; do
  echo "--- $repo ---"
  gh release list --repo your-org/$repo --limit 3
done
```

Collect the list of releases that need enrichment.
"""

[[steps]]
id = "enrich-notes"
title = "Rewrite release notes with proper context"
needs = ["find-releases"]
description = """
For each release that needs enrichment:

**1. Get the diff since the previous release:**
```bash
gh api repos/your-org/<repo>/compare/<prev_tag>...<new_tag> --jq '.commits[].commit.message'
# Also get file changes:
gh api repos/your-org/<repo>/compare/<prev_tag>...<new_tag> --jq '.files[].filename' | head -30
```

**2. Read key changed files** to understand what actually changed (not just commit messages).

**3. Write release notes in this format:**

```markdown
## Highlights
<1-3 sentences summarizing the most important changes for users>

## Features
- **<human-readable description>** — what it does, why it matters

## Bug Fixes
- **<human-readable description>** — what was broken, how it's fixed

## Improvements
- <refactors, performance, DX improvements>

## Contributors
<list commit authors>
```

**Rules for writing notes:**
- NO bead IDs (pa-vv6, pc-lj5) — translate to human language
- NO agent jargon (polecat, witness, sling, molecule)
- NO "bd: backup" or merge commits
- Write for someone who uses the product, not someone who builds the agent system
- If a commit is purely internal (agent infra), skip it entirely

**4. Update the release:**
```bash
gh release edit <tag> --repo your-org/<repo> --notes-file <file>
```
"""

[[steps]]
id = "update-readmes"
title = "Update stale READMEs"
needs = ["find-releases"]
description = """
For each repo, check if the README is stale:

```bash
gh api repos/your-org/<repo>/readme --jq '.content' | base64 -d
```

A README is stale if:
- Last updated date is >30 days ago
- Missing sections (setup, usage, API docs)
- References dead URLs or removed features
- Doesn't reflect current deployment status

For stale READMEs, generate an updated version:

**Structure:**
```markdown
# Project Name

<1-2 line description>

## Quick Start
<Clone, install, run — 3 commands max>

## Architecture
<Brief overview of tech stack and components>

## Development
<How to set up local dev, run tests>

## Deployment
<Where it's deployed, how CI/CD works>

## API Reference (if applicable)
<Key endpoints>

## Contributing
<Link to wasteland board, PR workflow>
```

Create a PR on GitHub with the README update:
```bash
# Create branch, commit, push, PR
```

Do NOT update READMEs that look manually maintained and recent.
"""

[[steps]]
id = "report"
title = "Report what was updated"
needs = ["enrich-notes", "update-readmes"]
description = """
Log summary:
- N releases enriched (list repos + tags)
- N READMEs updated (list repos)
- Any errors

Mail deacon if any failures.
"""
