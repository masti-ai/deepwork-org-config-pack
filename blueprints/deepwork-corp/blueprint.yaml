# Deepwork Corporation — Organization Blueprint
# Defines the org structure, departments, roles, and work routing rules
# for the GT Mesh-based AI development organization

apiVersion: gt.deepwork.ai/v1
kind: OrganizationBlueprint
metadata:
  name: deepwork-corp
  version: "1.0.0"
  description: Deepwork AI Corporation - Multi-agent software development organization
  maintainer: deepwork-hq

departments:
  engineering:
    name: Engineering
    description: Core software development and technical implementation
    lead: vp-engineering
    domains:
      - backend
      - frontend
      - infrastructure
      - devops
      - ai-ml
    repos:
      - ai-planogram
      - alc-ai-villa
      - OfficeWorld
      - deepwork-site
    routing_tags:
      - code
      - implementation
      - architecture

  product:
    name: Product
    description: Product management, roadmap planning, and feature specification
    lead: product-manager
    domains:
      - product-strategy
      - user-research
      - roadmap
      - requirements
    routing_tags:
      - spec
      - roadmap
      - feature-request

  qa:
    name: Quality Assurance
    description: Testing, quality control, and bug triage
    lead: qa-lead
    domains:
      - testing
      - bug-triage
      - quality-gates
      - regression
    routing_tags:
      - bug
      - test
      - quality

  content:
    name: Content
    description: Documentation, marketing content, and release notes
    lead: content-lead
    domains:
      - documentation
      - copywriting
      - release-notes
      - social-media
      - blog
    repos:
      - content-studio
    routing_tags:
      - docs
      - content
      - copy

  business:
    name: Business Development
    description: Client relations, business operations, and partnerships
    lead: business-lead
    domains:
      - client-management
      - partnerships
      - operations
      - finance
    routing_tags:
      - client
      - biz
      - ops

  release-ops:
    name: Release & Operations
    description: Release management, deployment, and operational excellence
    lead: release-manager
    domains:
      - release-management
      - deployment
      - ci-cd
      - monitoring
      - incident-response
    routing_tags:
      - release
      - deploy
      - ops
      - incident

roles:
  # Leadership
  ceo:
    title: Chief Executive Officer
    level: C-Suite
    responsibilities:
      - Strategic direction
      - Executive decisions
      - Stakeholder communication
    llm: Claude
    model: claude-3-5-sonnet-20241022
    node_assignment: deepwork-hq

  vp-engineering:
    title: VP of Engineering
    level: Executive
    reports_to: ceo
    responsibilities:
      - Technical architecture
      - Engineering standards
      - Team coordination
    llm: Claude
    model: claude-3-5-sonnet-20241022
    node_assignment: deepwork-hq
    department: engineering

  # Department Leads
  product-manager:
    title: Product Manager
    level: Lead
    reports_to: ceo
    responsibilities:
      - Feature specification
      - Backlog management
      - Stakeholder alignment
    llm: Claude
    model: claude-3-5-sonnet-20241022
    department: product

  qa-lead:
    title: QA Lead
    level: Lead
    reports_to: vp-engineering
    responsibilities:
      - Test strategy
      - Quality gates
      - Bug triage
    llm: Kimi
    model: kimi-k2.5
    department: qa

  content-lead:
    title: Content Lead
    level: Lead
    reports_to: ceo
    responsibilities:
      - Content strategy
      - Documentation standards
      - Brand voice
    llm: Kimi
    model: kimi-k2.5
    department: content

  business-lead:
    title: Business Lead
    level: Lead
    reports_to: ceo
    responsibilities:
      - Client relationships
      - Business development
      - Operations
    llm: Claude
    model: claude-3-5-sonnet-20241022
    department: business

  release-manager:
    title: Release Manager
    level: Lead
    reports_to: vp-engineering
    responsibilities:
      - Release coordination
      - Deployment management
      - Incident response
    llm: Claude
    model: claude-3-5-sonnet-20241022
    department: release-ops

  # Individual Contributors - Senior Level
  senior-developer:
    title: Senior Developer
    level: SD-1
    reports_to: vp-engineering
    responsibilities:
      - Complex feature implementation
      - Code review
      - Technical design
      - Mentorship
    llm: MiniMax
    model: minimax-text-01
    nodes:
      - deepwork-eng-1
    capabilities:
      - complex_architecture
      - system_design
      - performance_optimization
      - security_hardening
      - refactors

  # Individual Contributors - Junior Level
  junior-developer:
    title: Junior Developer
    level: SD-2
    reports_to: vp-engineering
    responsibilities:
      - Feature implementation
      - Bug fixes
      - Documentation
      - Testing
    llm: Kimi
    model: kimi-k2.5
    nodes:
      - deepwork-eng-2
    capabilities:
      - ui_ux
      - content
      - simple_fixes
      - documentation
      - test_writing

  qa-engineer:
    title: QA Engineer
    level: IC
    reports_to: qa-lead
    responsibilities:
      - Test automation
      - Manual testing
      - Bug verification
    llm: Kimi
    model: kimi-k2.5
    nodes:
      - deepwork-eng-2

  content-writer:
    title: Content Writer
    level: IC
    reports_to: content-lead
    responsibilities:
      - Documentation
      - Release notes
      - Marketing copy
    llm: Kimi
    model: kimi-k2.5
    nodes:
      - deepwork-eng-2

# Mesh Topology
mesh_topology:
  description: 3-node hierarchical mesh with coordination and execution layers
  nodes:
    deepwork-hq:
      name: HQ Coordinator
      role: planner
      location: central
      capabilities:
        - task_planning
        - resource_allocation
        - conflict_resolution
        - strategic_decisions
      llm: Claude
      model: claude-3-5-sonnet-20241022
      handles:
        - architecture_review
        - cross_team_coordination
        - executive_decisions
        - complex_planning

    deepwork-eng-1:
      name: Senior Engineering
      role: worker
      level: senior
      location: execution-layer
      capabilities:
        - complex_coding
        - system_design
        - code_review
        - performance_optimization
      llm: MiniMax
      model: minimax-text-01
      handles:
        - backend_architecture
        - ml_models
        - database_design
        - api_design
        - security_implementation

    deepwork-eng-2:
      name: Junior Engineering
      role: worker
      level: junior
      location: execution-layer
      capabilities:
        - ui_development
        - documentation
        - testing
        - bug_fixes
        - content_creation
      llm: Kimi
      model: kimi-k2.5
      handles:
        - frontend_features
        - documentation
        - test_automation
        - simple_features
        - content_writing

# Work Routing Rules
routing_rules:
  description: Automatic work assignment based on complexity and type
  
  by_complexity:
    complex:
      criteria:
        - multi_file_changes
        - architectural_impact
        - performance_critical
        - security_sensitive
      assign_to:
        - role: senior-developer
        - node: deepwork-eng-1
        - llm: MiniMax
      
    medium:
      criteria:
        - single_module_changes
        - ui_components
        - api_integration
      assign_to:
        - role: [senior-developer, junior-developer]
        - node: [deepwork-eng-1, deepwork-eng-2]
      
    simple:
      criteria:
        - bug_fixes
        - text_changes
        - configuration_updates
        - documentation
      assign_to:
        - role: junior-developer
        - node: deepwork-eng-2
        - llm: Kimi

  by_type:
    code:
      description: Software development tasks
      routing:
        complex_architecture:
          assign_to: [deepwork-eng-1, deepwork-hq]
          llm: [MiniMax, Claude]
        
        backend_api:
          assign_to: deepwork-eng-1
          llm: MiniMax
        
        frontend_ui:
          assign_to: deepwork-eng-2
          llm: Kimi
        
        database:
          assign_to: deepwork-eng-1
          llm: MiniMax
        
        devops:
          assign_to: deepwork-eng-1
          llm: MiniMax

    content:
      description: Documentation and copywriting
      routing:
        technical_docs:
          assign_to: deepwork-eng-2
          llm: Kimi
        
        release_notes:
          assign_to: deepwork-eng-2
          llm: Kimi
        
        blog_posts:
          assign_to: deepwork-eng-2
          llm: Kimi
        
        copywriting:
          assign_to: deepwork-eng-2
          llm: Kimi

    qa:
      description: Testing and quality
      routing:
        test_automation:
          assign_to: deepwork-eng-2
          llm: Kimi
        
        bug_triage:
          assign_to: deepwork-eng-2
          llm: Kimi
        
        manual_testing:
          assign_to: deepwork-eng-2
          llm: Kimi

    architecture:
      description: System design and architecture
      routing:
        system_design:
          assign_to: deepwork-hq
          llm: Claude
        
        tech_decisions:
          assign_to: deepwork-hq
          llm: Claude
        
        security_review:
          assign_to: [deepwork-hq, deepwork-eng-1]
          llm: [Claude, MiniMax]

    coordination:
      description: Planning and coordination
      routing:
        task_planning:
          assign_to: deepwork-hq
          llm: Claude
        
        conflict_resolution:
          assign_to: deepwork-hq
          llm: Claude
        
        resource_allocation:
          assign_to: deepwork-hq
          llm: Claude

# Tag-based Routing
tag_routing:
  # Engineering tags
  "type:bug":
    priority: medium
    assign_to: junior-developer
  
  "type:feature":
    priority: high
    assign_review: senior-developer
  
  "type:refactor":
    priority: low
    assign_to: senior-developer
  
  "type:docs":
    priority: low
    assign_to: content-writer
  
  "complexity:high":
    assign_to: senior-developer
    review_required: true
    reviewer: vp-engineering
  
  "complexity:medium":
    assign_to: [senior-developer, junior-developer]
  
  "complexity:low":
    assign_to: junior-developer
  
  "area:frontend":
    assign_to: junior-developer
    skills: [react, typescript, tailwind]
  
  "area:backend":
    assign_to: senior-developer
    skills: [python, fastapi, postgresql]
  
  "area:ai-ml":
    assign_to: senior-developer
    skills: [pytorch, tensorflow, yolo]
  
  "area:infrastructure":
    assign_to: senior-developer
    skills: [kubernetes, terraform, aws]

# Escalation Rules
escalation:
  timeout_minutes: 60
  
  path:
    - level: 1
      target: junior-developer
      timeout: 60
    
    - level: 2
      target: senior-developer
      timeout: 120
    
    - level: 3
      target: vp-engineering
      timeout: 240
    
    - level: 4
      target: ceo

# Communication Protocols
communication:
  mesh_channels:
    - name: gt-local
      type: broadcast
      purpose: All-hands announcements
    
    - name: gt-engineering
      type: department
      purpose: Engineering team coordination
    
    - name: gt-qa
      type: department
      purpose: QA coordination
    
    - name: gt-content
      type: department
      purpose: Content team coordination
    
    - name: gt-ops
      type: department
      purpose: Release and operations

  signal_patterns:
    urgent: "🔴 URGENT"
    blocking: "🚫 BLOCKED"
    review_needed: "👀 REVIEW"
    help_wanted: "🆘 HELP"
    ready_for_qa: "✅ QA-READY"

# Quality Gates
quality_gates:
  required_checks:
    - name: lint
      run_on: [code, refactor]
      required_for: [senior-developer, junior-developer]
    
    - name: test
      run_on: [code, bug]
      required_for: [senior-developer, junior-developer]
    
    - name: type_check
      run_on: [code, refactor]
      required_for: [senior-developer, junior-developer]
    
    - name: security_scan
      run_on: [code]
      required_for: [senior-developer]
    
    - name: architecture_review
      run_on: [complexity:high]
      required_for: [vp-engineering]

# Metrics & KPIs
metrics:
  individual:
    - tasks_completed
    - code_reviews_given
    - bugs_fixed
    - documentation_pages
    - commits_merged
  
  team:
    - sprint_velocity
    - release_frequency
    - bug_escape_rate
    - code_coverage
    - documentation_coverage
  
  organization:
    - time_to_production
    - deployment_frequency
    - change_failure_rate
    - mean_time_to_recovery
    - contributor_satisfaction
