# Mayor Role — Town Coordinator
#
# The mayor is the human (or designated agent) coordinator for Gas Town.
# They have override capabilities and access to all governance functions.

role:
  name: mayor
  scope: city
  description: |
    Town coordinator with oversight of all rigs, agents, and operations.
    The mayor handles escalation, cross-rig coordination, and governance.

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CAPABILITIES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

capabilities:
  # Override capabilities
  - estop                    # Emergency stop all agents
  - thaw                     # Resume from estop
  - mode_set                 # Change GT mode (eco/balanced/turbo/maintenance)
  
  # Query capabilities
  - town_status              # Full town health
  - beads_overview           # Cross-rig bead status
  - costs_report             # Resource usage
  - agent_sessions           # Active sessions
  
  # Action capabilities
  - nudge_any                # Wake any agent
  - mail_broadcast           # Send to all agents
  - rig_start_stop           # Control rig lifecycle
  - formula_install          # Install new formulas

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# HOOKS — Claude Code settings
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

hooks:
  base: mayor-base
  overlays:
    - governance             # Override approvals, escalation
    - monitoring             # Dashboard access
    - di_admin               # DI template management

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# WORKFLOW PREFERENCES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

workflow:
  # Default mode when mayor starts work
  preferred_mode: balanced
  
  # Escalation settings
  escalation:
    auto_escalate: false    # Mayor reviews manually
    notify_on: [estop, critical_error, stuck_beads]
  
  # Reporting
  daily_digest: true
  weekly_summary: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# MOLECULE PREFERENCES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

molecule:
  # Mayor uses persistent molecules (not burned)
  auto_squash: false
  
  # Step tracking
  step_notifications: true
  
  # DAG visualization
  show_dag_on_attach: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# WASTELAND INTEGRATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

wasteland:
  # Mayor reviews before publishing
  auto_sync: false
  
  # Can publish to any priority
  publish_priority: [0, 1, 2, 3]
  
  # Review settings
  review_required: true
  min_quality_score: 0.8
