# Polecat Role — Disposable Worker
#
# Polecats are transient agents that pick up beads, do the work, and exit.
# They follow the molecule workflow for structured execution.

role:
  name: polecat
  scope: rig
  description: |
    Disposable worker agents that execute beads following the
    molecule workflow pattern. Each polecat works on one bead
    then exits cleanly.

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CAPABILITIES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

capabilities:
  # Bead workflow
  - bead_claim               # Claim open bead from queue
  - bead_work                # Execute work on claimed bead
  - bead_done                # Mark bead complete, trigger refinery
  - bead_handoff             # Hand off to next agent
  
  # Molecule workflow
  - mol_attach               # Attach molecule to hook
  - mol_detach               # Release molecule
  - mol_step_done            # Complete current step
  - mol_squash               # Compress molecule to digest
  - mol_burn                 # Discard molecule (on error/abort)
  
  # Git operations
  - branch_create            # Create work branch
  - commit                   # Commit changes
  - pr_create                # Create pull request
  
  # Communication
  - nudge_send               # Send nudges
  - mail_send                # Send mail
  - checkpoint               # Save session state

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# MOLECULE WORKFLOW
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Polecats follow this molecule lifecycle:
# 1. mol attach <molecule>  — Load work instructions
# 2. mol step done          — Complete setup/planning
# 3. Execute work steps
# 4. mol step done          — Complete implementation
# 5. mol step done          — Complete testing
# 6. mol squash "Summary"   — Compress to digest
# 7. gt done                — Submit to refinery
# 8. mol detach             — Release molecule

molecule:
  # Polecats burn molecules on error (don't preserve failed state)
  auto_burn_on_error: true
  
  # Squash before done
  auto_squash: true
  
  # Step timeout
  step_timeout: "30m"
  
  # Checkpoint frequency
  checkpoint_interval: "15m"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# HOOKS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

hooks:
  base: polecat-base
  overlays:
    - worker                 # Work patterns, code style
    - di_worker              # DI for PR descriptions
  
  # Per-rig hook customization
  rig_specific: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# FORMULAS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

formulas:
  default: mol-polecat-base
  available:
    - mol-polecat-base       # Standard feature work
    - mol-polecat-commit     # Quick commits
    - mol-do-work            # Generic task execution
    - mol-scoped-work        # Time-boxed work

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# LIFECYCLE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

lifecycle:
  # Polecats are transient
  idle_timeout: "2h"
  max_runtime: "4h"
  
  # Cleanup on exit
  cleanup_worktree: true
  preserve_artifacts: [".log", ".diff", ".report"]
  
  # Exit conditions
  exit_on:
    - bead_complete
    - max_runtime_exceeded
    - estop

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# WASTELAND INTEGRATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

wasteland:
  # Polecats don't publish directly
  auto_sync: false
  
  # Notify on completion for mayor review
  notify_on_complete: true
