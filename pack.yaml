# Deepwork Org Config Pack — Operational knowledge for Deepwork-AI Gas Town
# Shared config that all agents, town instances, and external collaborators reference.
# Updated: 2026-04-01 (v4.0.0 — wasteland federation, full formula set, automation scripts)
