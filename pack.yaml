# Deepwork Org Config Pack — v5.0.0
# Onboarding substrate for new Deepwork org members + any Mind install.
# Updated: 2026-04-18 — aligns with Deepwork Mind v1 (project-first, bd as
# work graph, bead_audit plugin, harness-agnostic event listener).
#
# v4 shipped the Gas-Town-internal operational model (63 formulas, wasteland
# handlers, crew roles). Most of that is internal mayor/polecat/refinery
# plumbing and has been moved to archive/2026-04-pre-mind-v5/ for
# reference. v5 keeps only what a new org member + a fresh Mind install
# actually need.
name: "deepwork-org-config"
version: "5.0.0"
description: "Onboarding config pack for Deepwork org — Mind install, hooks, skills, core formulas, foundational knowledge. Gas Town ops archived separately."
author: "deepwork"
tags: "deepwork, mind, onboarding, hooks, skills, workflows, bead-audit"

roles:
  - roles/mayor.yaml
  - roles/crew.yaml

rules:
  - rules/deepwork-governance.yaml

crons:
  - crons/worker-crons.yaml

knowledge:
  - knowledge/deepwork-mind-setup.md
  - knowledge/deepwork-mind-tools.md
  - knowledge/hooks-reference.md
  - knowledge/bead-audit-plugin.md
  - knowledge/plugins-reference.md
  - knowledge/anti-patterns.md
  - knowledge/patterns.md
  - knowledge/decisions.md
  - knowledge/conventions.md
  - knowledge/products.md
  - knowledge/rules.md
  - knowledge/shared-knowledge.md
  - knowledge/bug-fixes.md
  - knowledge/troubleshooting.md

formulas:
  - formulas/beads-workflow.formula.toml
  - formulas/beads-creation-expansion.formula.toml
  - formulas/beads-release.formula.toml
  - formulas/beads-review-to-plan-expansion.formula.toml
  - formulas/code-review.formula.toml
  - formulas/design.formula.toml
  - formulas/cooking.formula.toml

scripts:
  - scripts/readme-release.sh
  - scripts/changelog/append.sh
  - scripts/knowledge/capture.sh
  - scripts/knowledge/evolve.sh
  - scripts/knowledge/cron-evolve.sh
  - scripts/knowledge/on-bead-close.sh
  - scripts/knowledge/health-check.sh

skills:
  - skills/gt-mesh/
  - skills/gt-mesh-contributor/
  - skills/gt-mesh-setup/

hooks:
