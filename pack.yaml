# Deepwork Org Config Pack — v5.1.0
# Lean onboarding substrate. Zero Gas-Town runtime internals.
# Updated: 2026-04-18 — aligned with Deepwork Mind v1.

name: "deepwork-org-config"
version: "5.1.0"
description: "Lean onboarding config pack for Deepwork Mind users. Mind setup, hooks, 15 product formulas, 10 knowledge files. Auto-refreshes knowledge nightly via DI MCP."
author: "deepwork"
tags: "deepwork, mind, onboarding, hooks, bead-audit"

roles:
  - roles/mayor.yaml
  - roles/crew.yaml

rules:
  - rules/deepwork-governance.yaml

crons:
  - crons/pack-auto-refresh.yaml

knowledge:
  - knowledge/deepwork-mind-setup.md
  - knowledge/deepwork-mind-tools.md
  - knowledge/hooks-reference.md
  - knowledge/bead-audit-plugin.md
  - knowledge/anti-patterns.md
  - knowledge/patterns.md
  - knowledge/decisions.md
  - knowledge/conventions.md
  - knowledge/products.md
  - knowledge/troubleshooting.md

formulas:
  - formulas/beads-workflow.formula.toml
  - formulas/beads-creation-expansion.formula.toml
  - formulas/beads-release.formula.toml
  - formulas/beads-review-to-plan-expansion.formula.toml
  - formulas/plan-workflow.formula.toml
  - formulas/plan-writing-expansion.formula.toml
  - formulas/plan-review-to-spec-expansion.formula.toml
  - formulas/spec-workflow.formula.toml
  - formulas/spec-brainstorm-expansion.formula.toml
  - formulas/spec-questions-interview-expansion.formula.toml
  - formulas/spec-multimodal-review-expansion.formula.toml
  - formulas/spec-multimodal-scope-questions-expansion.formula.toml
  - formulas/code-review.formula.toml
  - formulas/security-audit.formula.toml
  - formulas/design.formula.toml

scripts:
  - scripts/pack_auto_refresh.sh
  - scripts/readme-release.sh
  - scripts/changelog/append.sh
  - scripts/knowledge/capture.sh
  - scripts/knowledge/evolve.sh
  - scripts/knowledge/cron-evolve.sh
  - scripts/knowledge/on-bead-close.sh
  - scripts/knowledge/health-check.sh

# No skills block — Mind manages skills. The 3 gt-mesh skills (month-old,
# unused) were dropped. New skills land via `mind skill_install` at the
# project level, not via pack bundling.

hooks:
  - hooks/claude.json
