# Deepwork Organization Config Pack v4.0.0
# Shared operational knowledge for Deepwork-AI Gas Town deployments
#
# Version History:
# v4.0.0 (2026-04-11) - Added GT Modes, Molecule system, Smart Cron, DI integration
# v3.0.0 (2026-04-01) - Modernized roles, knowledge, crons

pack:
  name: deepwork-org-config
  version: "4.0.0"
  schema: 1
  description: |
    Shared operational knowledge for Deepwork-AI Gas Town deployments.
    All agents reference this pack for roles, patterns, anti-patterns,
    operational procedures, and GT mode configurations.

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# GT MODES — Configurable runtime modes
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Switch modes: gt mode set <mode>
# Current mode: gt mode get
# Override: GT_MODE=eco gt start

modes:
  eco:
    description: Low resource mode — reduced agent pool, longer intervals
    config:
      agent_pool_max: 2
      scheduler_interval: "5m"
      retry_backoff: "2x"
      di_timeout: "120s"
      wasteland_sync: "12h"
      mail_check: "10m"
      auto_spawn: false
    agents:
      worker:
        idle_timeout: "30m"
      dog:
        enabled: ["wasteland-sync", "jsonl-export"]

  balanced:
    description: Default mode — normal resource usage
    config:
      agent_pool_max: 5
      scheduler_interval: "30s"
      retry_backoff: "1x"
      di_timeout: "60s"
      wasteland_sync: "4h"
      mail_check: "2m"
      auto_spawn: true
    agents:
      worker:
        idle_timeout: "2h"
      dog:
        enabled: ["wasteland-sync", "jsonl-export", "checkpoint", "reaper"]

  turbo:
    description: High performance mode — maximum throughput
    config:
      agent_pool_max: 10
      scheduler_interval: "10s"
      retry_backoff: "1x"
      di_timeout: "30s"
      wasteland_sync: "1h"
      mail_check: "30s"
      auto_spawn: true
      parallel_dispatch: true
    agents:
      worker:
        idle_timeout: "4h"
      dog:
        enabled: ["wasteland-sync", "jsonl-export", "checkpoint", "reaper", "stale-hook", "compactor"]

  maintenance:
    description: Maintenance mode — pause work, allow admin tasks
    config:
      agent_pool_max: 0
      scheduler_interval: "5m"
      retry_backoff: "stop"
      wasteland_sync: "off"
      mail_check: "off"
      auto_spawn: false
      allow_manual: true
      estop_active: true
    agents:
      worker:
        idle_timeout: "0"
      dog:
        enabled: []
      admin:
        override: true

  default: balanced

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# MOLECULE SYSTEM
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Molecules are agent work units managed via `mol` commands

molecule_commands:
  status: "Show what's on an agent's hook"
  current: "Show current molecule (what agent should work on)"
  progress: "Show execution progress"
  attach: "Attach molecule to hook"
  detach: "Detach molecule from hook"
  burn: "Burn current molecule (discard without record)"
  squash: "Squash molecule to digest"
  step_done: "Complete current step"
  dag: "Visualize molecule DAG"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SMART CRON SYSTEM
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Cron-based scheduling with intelligent retry and dependency management

cron_features:
  retry_strategies:
    fixed: "Constant delay between retries"
    exponential: "Double delay each retry (1x, 2x, 4x, 8x)"
    linear: "Add constant increment each retry"
  
  smart_features:
    - "Auto-detects missed executions during downtime"
    - "Coalesces rapid successive triggers"
    - "Backoff on repeated failures"
    - "Dependency awareness (waits for dependent orders)"
    - "Mode-aware (respects eco/turbo settings)"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# HOOKS SYSTEM
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Claude Code settings.json configurations

hooks_commands:
  sync: "Regenerate all settings.json files"
  diff: "Preview sync changes"
  list: "Show managed locations"
  scan: "Scan for existing hooks"
  registry: "List available hooks"
  install: "Install hook from registry"

hook_locations:
  rig_base: "{{ .Rig }}/.claude/settings.json"
  role_overlay: "{{ .Rig }}/.claude/settings.json.d/"
  agent_specific: "{{ .Rig }}/.claude/agents/<name>.json"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# WASTELAND INTEGRATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Public work board publishing

wasteland_hooks:
  on_create: "Triggered when bead is created"
  on_close: "Triggered when bead is closed"
  on_convoy: "Triggered on convoy lifecycle events"

wasteland_config:
  auto_sync: true
  min_priority: 1
  include_acceptance: true

wasteland_commands:
  post: "gt wl post --title '...' --type feature --priority 1"
  stamp: "gt wl stamp <completion-id>"
  status: "gt wl status"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DEEPWORK INTELLIGENCE (DI) INTEGRATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Structured content generation via DI MCP

di_integration:
  templates:
    readme: "docs_generate(rig, 'readme')"
    docs: "docs_create(rig, title, doc_type, context)"
    pr_body: "github_create_pr(rig, branch, base, context)"
    release: "github_create_release(rig, version, context)"
  
  wasteland_ops:
    flywheel: "wasteland_flywheel(rig)"
    stamp: "wasteland_stamp(completion_id)"
    status: "wasteland_status()"
  
  context_variables:
    DiContext: "Current DI session context"
    DiCatalog: "Available templates and patterns"
    DiHistory: "Recent DI invocations"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# GT MONITOR CONTROL PLANE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# API endpoints for town control

gt_monitor:
  capabilities:
    - Refinery      # Merge queue processor
    - Molecules     # Agent molecule workflows
    - Orphans       # Orphan detection/cleanup
    - Synthesis     # Work synthesis bundles
    - Directives    # Agent work instructions
    - Hooks         # Claude Code hooks
    - Scheduler     # Capacity-managed dispatch
    - Formulas      # Workflow templates
  
  endpoints:
    capabilities: "GET /v1/capabilities"
    execute: "POST /v1/execute"
    query: "GET /v1/query"
