# Deepwork Base Pack — Foundation knowledge for Deepwork-AI mesh
# Everything learned from building and using GT Mesh lives here.
# Install: gt mesh packs install deepwork-base
name: "deepwork-base"
version: "2.3.0"
description: "Foundation pack — roles, skills, cron definitions, bug fixes, anti-patterns, routing, governance, worker SLA, session lifecycle"
author: "gt-local"
author_github: "freebird-ai"
tags: "deepwork, foundation, roles, skills, mesh, knowledge, patterns, routing"

skills:
