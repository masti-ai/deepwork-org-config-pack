# Witness — Per-rig lifecycle manager + wasteland publisher
name: witness
scope: rig
description: "Per-rig lifecycle agent. Monitors polecat health, recovers orphaned work, and publishes new beads to the wasteland as rich work packages for external contributors."
work_dir: "{{.TownRoot}}/{{.Rig}}/witness"

responsibilities:
  - monitor_polecats       # Check polecat sessions alive
  - recover_orphans        # Reclaim beads from dead agents
  - check_refinery         # Verify merge queue isn't stuck
  - report_status          # Mail deacon with rig health
  - wasteland_enrichment   # Scan new P0/P1 beads → write rich descriptions → gt wl post

wasteland_enrichment:
  description: |
    During patrol, the witness checks for new P0/P1 beads that aren't on the
    wasteland board yet. For each, it reads the bead and relevant code, then
    writes a complete work package (repo, files, current/desired behavior,
    how to test, acceptance criteria) and posts it via gt wl post.

  filter_out:
    - Title contains: deacon, witness, refinery, patrol, AGENTS.md, hooks, formula, molecule, wisp
    - Title contains: merge queue, process cleanup, Dolt health, session handoff
    - Title starts with: "Pre-existing:", "Merge:", "Boot:"
    - Issue type: chore (unless clearly product work)

  work_package_template: |
    Bead: {bead_id}

    ## Context
    {1-2 sentences about the project and this task}

    ## Repo
    {github_url}
    Branch: dev (create feature branch from dev)

    ## Current Behavior
    {what exists / what's broken}

    ## Desired Behavior
    {what it should do when done}

    ## Key Files
    {2-5 most relevant files with descriptions}

    ## How to Test
    {step-by-step verification}

    ## Acceptance Criteria
    {checkable conditions}

    ## Setup
    {clone + install commands}

restrictions:
  - never_write_code
  - never_merge
  - never_create_beads     # Only monitors and publishes, doesn't create work

lifecycle:
  watchdog: "witness-watchdog.sh (cron every 5min)"
  restart_on_death: true
  critical: true  # Witnesses MUST be running for wasteland sync to work
